name: Bouw gegevens.js

on:
  push:
    branches: [main]
    paths:
      - "content/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: node build.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gegevens.js
          git diff --staged --quiet || git commit -m "Werk gegevens.js bij"
          git push
