<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kunst</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 id="titel-header">Kunst</h1>
    <p>Schilderijen &amp; Beelden</p>
</header>

<nav>
    <a href="#over">Over de kunstenaar</a>
    <a href="#schilderijen">Schilderijen</a>
    <a href="#beelden">Beelden</a>
    <a href="#contact">Contact</a>
</nav>

<main>

    <section id="over">
        <h2>Over de kunstenaar</h2>
        <div class="over-de-kunstenaar">
            <p id="over-tekst"></p>
        </div>
    </section>

    <!-- ===== SCHILDERIJEN ===== -->
    <section id="schilderijen">
        <h2>Schilderijen</h2>
        <div class="galerij" id="galerij-schilderijen"></div>

    <!-- ===== BEELDEN ===== -->
    <section id="beelden">
        <h2>Beelden</h2>
        <div class="galerij" id="galerij-beelden"></div>
    </section>

    <!-- ===== CONTACT ===== -->
    <section id="contact">
        <h2>Contact</h2>
        <div class="contact">
            <p>Voor vragen of interesse in een schilderij of beeld:</p>
            <a id="contact-email" href="#"></a>
        </div>
    </section>

</main>

<footer>
    &copy; 2026 <span id="footer-naam"></span>
    <p><a href="admin/" class="beheer-knop">Foto's en tekst aanpassen</a></p>
